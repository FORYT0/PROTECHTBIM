services:
  - type: web
    name: protecht-bim-api
    env: node
    region: oregon
    plan: starter
    buildCommand: >
      npm install --include=dev &&
      npx nx run api:build --skip-nx-cache ||
      (cd apps/api && npm install && npx tsc -p tsconfig.json --outDir dist)
    startCommand: node apps/api/dist/apps/api/src/main.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: protecht-bim-db
          property: connectionString
      - key: DB_HOST
        value: db.rmqpdtrlmgjvkpibwwgr.supabase.co
      - key: DB_PORT
        value: "5432"
      - key: DB_NAME
        value: postgres
      - key: DB_USER
        value: postgres
      - key: DB_PASSWORD
        value: "[81K3JihcXgWGDBTE]"
      - key: REDIS_HOST
        value: still-goose-78774.upstash.io
      - key: REDIS_PORT
        value: "6379"
      - key: REDIS_PASSWORD
        value: gQAAAAAAATO2AAIncDE3ZjMzZGE3YWIyYmQ0MDljODQ4YzY4N2JkZWNkNzY0MHAxNzg3NzQ
      - key: REDIS_TLS
        value: "true"
      - key: GROQ_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: "https://protecht-bim.vercel.app,https://protecht-bim-web.vercel.app"
      - key: WEBSOCKET_CORS_ORIGIN
        value: "https://protecht-bim.vercel.app,https://protecht-bim-web.vercel.app"
      - key: PORT
        value: "3000"
