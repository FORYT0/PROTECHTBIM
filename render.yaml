# PROTECHT BIM ‚Äî Render.com Deployment Config
# Free tier: 512MB RAM, shared CPU, spins down after 15min inactivity.
# Database : Supabase (free, permanent)
# Redis    : Upstash  (free, 10k req/day)
# Frontend : Vercel   (free)

services:
  - type: web
    name: protechtbim-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install --include=dev && node apps/api/scripts/build-bundle.js
    startCommand: node apps/api/dist-bundle/main.js
    healthCheckPath: /health
    envVars:
      # ‚îÄ‚îÄ Runtime ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000

      # ‚îÄ‚îÄ Auth ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚