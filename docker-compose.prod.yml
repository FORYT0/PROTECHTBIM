version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: protecht-bim-postgres-prod
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-protecht_bim}
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?Database password required}
    ports:
      - '${DATABASE_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DATABASE_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - protecht-bim-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  redis:
    image: redis:7-alpine
    container_name: protecht-bim-redis-prod
    command: redis-server --requirepass ${REDIS_PASSWORD:?Redis password required}
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '--pass', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - protecht-bim-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  minio:
    image: minio/minio:latest
    container_name: protecht-bim-minio-prod
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY:?MinIO access key required}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY:?MinIO secret key required}
    ports:
      - '${STORAGE_PORT:-9000}:9000'
      - '${STORAGE_CONSOLE_PORT:-9001}:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - protecht-bim-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: protecht-bim-rabbitmq-prod
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:?RabbitMQ user required}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?RabbitMQ password required}
    ports:
      - '${RABBITMQ_PORT:-5672}:5672'
      - '${RABBITMQ_MANAGEMENT_PORT:-15672}:15672'
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'ping']
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - protecht-bim-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.prod
    container_name: protecht-bim-api-prod
    environment:
      # Database Configuration
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DATABASE_NAME:-protecht_bim}
      DATABASE_USER: ${DATABASE_USER:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:?Database password required}
      # Redis Configuration
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Redis password required}
      REDIS_DB: ${REDIS_DB:-0}
      # JWT Configuration
      JWT_SECRET: ${JWT_SECRET:?JWT secret required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-3600}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-604800}
      # Session Configuration
      SESSION_SECRET: ${SESSION_SECRET:?Session secret required}
      SESSION_TTL: ${SESSION_TTL:-86400}
      # MinIO/S3 Configuration
      STORAGE_ENDPOINT: minio:9000
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:?MinIO access key required}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:?MinIO secret key required}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-protecht-bim}
      STORAGE_USE_SSL: ${STORAGE_USE_SSL:-false}
      # RabbitMQ Configuration
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:?RabbitMQ user required}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?RabbitMQ password required}
      # Application Configuration
      NODE_ENV: production
      API_PORT: 3000
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS origin required}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - '${API_PORT:-3000}:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - protecht-bim-network
    restart: always

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  rabbitmq_data:
    driver: local

networks:
  protecht-bim-network:
    driver: bridge
