# PROTECHT BIM — Deploy on Koyeb (Free, no credit card required)
#
# ══════════════════════════════════════════════════════════════
# STACK (100% free, no card):
#   API:      Koyeb    — 1 free web service (512MB RAM, no sleep)
#   Database: Supabase — free Postgres (already provisioned)
#   Cache:    Upstash  — free Redis    (already provisioned)
#   Frontend: Vercel   — free hobby tier (already deployed)
# ══════════════════════════════════════════════════════════════

app_name: protechtbim

services:
  - name: protechtbim-api
    type: web
    git:
      repository: https://github.com/FORYT0/PROTECHTBIM
      branch: main
    build:
      buildpack: nodejs
      build_command: "npm install --include=dev && node apps/api/scripts/build-bundle.js"
    run:
      run_command: "node apps/api/dist-bundle/main.js"
    ports:
      - port: 3000
        protocol: http
    health_checks:
      - path: /health
        port: 3000
        interval: 30
    env:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: LOG_LEVEL
        value: info

      # ── Auth (add as secrets in Koyeb dashboard) ──────────────
      - key: JWT_SECRET
        secret: true
      - key: JWT_EXPIRES_IN
        value: "3600"
      - key: JWT_REFRESH_EXPIRES_IN
        value: "604800"
      - key: SESSION_SECRET
        secret: true
      - key: SESSION_TTL
        value: "86400"

      # ── Database — Supabase (add as secret in Koyeb dashboard) ─
      # postgresql://postgres:<PASSWORD>@db.<REF>.supabase.co:5432/postgres
      - key: DATABASE_URL
        secret: true

      # ── Cache — Upstash Redis (add as secret in Koyeb dashboard)
      # rediss://:<PASSWORD>@<HOST>.upstash.io:6379
      - key: REDIS_URL
        secret: true

      # ── CORS ──────────────────────────────────────────────────
      - key: CORS_ORIGIN
        value: "https://protecht-bim.vercel.app,https://protechtbim-web.vercel.app,http://localhost:5173"

      # ── AI — Groq free key (add as secret in Koyeb dashboard) ─
      - key: GROQ_API_KEY
        secret: true

      # ── Storage (disabled) ─────────────────────────────────────
      - key: STORAGE_ENDPOINT
        value: ""
      - key: STORAGE_USE_SSL
        value: "false"
