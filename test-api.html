<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROTECHT BIM API Tester</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
        }
        
        .content {
            padding: 30px;
        }
        
        .section {
            margin-bottom: 30px;
        }
        
        .section h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 20px;
        }
        
        .button-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .input-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }
        
        input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .output {
            background: #f5f5f5;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            padding: 15px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        
        .output.success {
            border-color: #4caf50;
            background: #f1f8f4;
        }
        
        .output.error {
            border-color: #f44336;
            background: #fef1f0;
        }
        
        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;
        }
        
        .status.online {
            background: #4caf50;
            color: white;
        }
        
        .status.offline {
            background: #f44336;
            color: white;
        }
        
        .token-display {
            background: #fff3cd;
            border: 2px solid #ffc107;
            border-radius: 6px;
            padding: 10px;
            margin-top: 10px;
            font-size: 12px;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏗️ PROTECHT BIM API Tester</h1>
            <p>Test your production API endpoints</p>
        </div>
        
        <div class="content">
            <!-- Status Section -->
            <div class="section">
                <h2>API Status <span id="statusBadge" class="status offline">Checking...</span></h2>
                <div class="button-group">
                    <button onclick="checkHealth()">Check Health</button>
                    <button onclick="getApiInfo()">Get API Info</button>
                </div>
                <div id="statusOutput" class="output"></div>
            </div>
            
            <!-- Authentication Section -->
            <div class="section">
                <h2>Authentication</h2>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="email" value="test@protecht.com" placeholder="Enter email">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" value="Test123!@#" placeholder="Enter password">
                </div>
                <div class="input-group">
                    <label>First Name</label>
                    <input type="text" id="firstName" value="Test" placeholder="First name">
                </div>
                <div class="input-group">
                    <label>Last Name</label>
                    <input type="text" id="lastName" value="User" placeholder="Last name">
                </div>
                <div class="button-group">
                    <button onclick="register()">Register</button>
                    <button onclick="login()">Login</button>
                    <button onclick="getCurrentUser()" id="getMeBtn" disabled>Get Current User</button>
                    <button onclick="logout()" id="logoutBtn" disabled>Logout</button>
                </div>
                <div id="authOutput" class="output"></div>
                <div id="tokenDisplay" class="token-display" style="display: none;"></div>
            </div>
            
            <!-- Projects Section -->
            <div class="section">
                <h2>Projects</h2>
                <div class="input-group">
                    <label>Project Name</label>
                    <input type="text" id="projectName" value="Test Project" placeholder="Enter project name">
                </div>
                <div class="input-group">
                    <label>Description</label>
                    <input type="text" id="projectDesc" value="Test project created from browser" placeholder="Enter description">
                </div>
                <div class="button-group">
                    <button onclick="createProject()" id="createProjectBtn" disabled>Create Project</button>
                    <button onclick="listProjects()" id="listProjectsBtn" disabled>List Projects</button>
                </div>
                <div id="projectOutput" class="output"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api/v1';
        let authToken = null;

        // Check health on load
        window.onload = () => {
            checkHealth();
        };

        function updateAuthButtons() {
            const isAuthenticated = authToken !== null;
            document.getElementById('getMeBtn').disabled = !isAuthenticated;
            document.getElementById('logoutBtn').disabled = !isAuthenticated;
            document.getElementById('createProjectBtn').disabled = !isAuthenticated;
            document.getElementById('listProjectsBtn').disabled = !isAuthenticated;
            
            if (isAuthenticated) {
                document.getElementById('tokenDisplay').style.display = 'block';
                document.getElementById('tokenDisplay').textContent = `Token: ${authToken.substring(0, 50)}...`;
            } else {
                document.getElementById('tokenDisplay').style.display = 'none';
            }
        }

        async function checkHealth() {
            const output = document.getElementById('statusOutput');
            const badge = document.getElementById('statusBadge');
            
            try {
                const response = await fetch('http://localhost:3000/health');
                const data = await response.json();
                
                output.className = 'output success';
                output.textContent = JSON.stringify(data, null, 2);
                
                badge.className = 'status online';
                badge.textContent = 'Online';
            } catch (error) {
                output.className = 'output error';
                output.textContent = `Error: ${error.message}`;
                
                badge.className = 'status offline';
                badge.textContent = 'Offline';
            }
        }

        async function getApiInfo() {
            const output = document.getElementById('statusOutput');
            
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                output.className = 'output success';
                output.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                output.className = 'output error';
                output.textContent = `Error: ${error.message}`;
            }
        }

        async function register() {
            const output = document.getElementById('authOutput');
            
            const data = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value
            };
            
            try {
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    authToken = result.token;
                    updateAuthButtons();
                    output.className = 'output success';
                    output.textContent = `✅ Registration successful!\n\n${JSON.stringify(result, null, 2)}`;
                } else {
                    output.className = 'output error';
                    output.textContent = `❌ Registration failed:\n\n${JSON.stringify(result, null, 2)}`;
                }
            } catch (error) {
                output.className = 'output error';
                output.textContent = `Error: ${error.message}`;
            }
        }

        async function login() {
            const output = document.getElementById('authOutput');
            
            const data = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };
            
            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    authToken = result.token;
                    updateAuthButtons();
                    output.className = 'output success';
                    output.textContent = `✅ Login successful!\n\n${JSON.stringify(result, null, 2)}`;
                } else {
                    output.className = 'output error';
                    output.textContent = `❌ Login failed:\n\n${JSON.stringify(result, null, 2)}`;
                }
            } catch (error) {
                output.className = 'output error';
                output.textContent = `Error: ${error.message}`;
            }
        }

        async function getCurrentUser() {
            const output = document.getElementById('authOutput');
            
            try {
                const response = await fetch(`${API_URL}/auth/me`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    output.className = 'output success';
                    output.textContent = `✅ Current user:\n\n${JSON.stringify(result, null, 2)}`;
                } else {
                    output.className = 'output error';
                    output.textContent = `❌ Failed:\n\n${JSON.stringify(result, null, 2)}`;
                }
            } catch (error) {
                output.className = 'output error';
                output.textContent = `Error: ${error.message}`;
            }
        }

        function logout() {
            authToken = null;
            updateAuthButtons();
            document.getElementById('authOutput').textContent = '✅ Logged out successfully';
            document.getElementById('authOutput').className = 'output success';
        }

        async function createProject() {
            const output = document.getElementById('projectOutput');
            
            const data = {
                name: document.getElementById('projectName').value,
                description: document.getElementById('projectDesc').value,
                startDate: new Date().toISOString().split('T')[0],
                status: 'active'
            };
            
            try {
                const response = await fetch(`${API_URL}/projects`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    output.className = 'output success';
                    output.textContent = `✅ Project created!\n\n${JSON.stringify(result, null, 2)}`;
                } else {
                    output.className = 'output error';
                    output.textContent = `❌ Failed:\n\n${JSON.stringify(result, null, 2)}`;
                }
            } catch (error) {
                output.className = 'output error';
                output.textContent = `Error: ${error.message}`;
            }
        }

        async function listProjects() {
            const output = document.getElementById('projectOutput');
            
            try {
                const response = await fetch(`${API_URL}/projects`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    output.className = 'output success';
                    output.textContent = `✅ Found ${result.length} project(s):\n\n${JSON.stringify(result, null, 2)}`;
                } else {
                    output.className = 'output error';
                    output.textContent = `❌ Failed:\n\n${JSON.stringify(result, null, 2)}`;
                }
            } catch (error) {
                output.className = 'output error';
                output.textContent = `Error: ${error.message}`;
            }
        }
    </script>
</body>
</html>
