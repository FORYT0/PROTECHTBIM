$kind: http-request
name: 'Create Work Package'
method: POST
url: '{{baseUrl}}/api/v1/work_packages'
order: 2000
headers:
  - key: Authorization
    value: 'Bearer {{authToken}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "project_id": "{{projectId}}",
      "type": "task",
      "subject": "Foundation Work",
      "description": "Excavation and foundation pouring",
      "status": "new",
      "priority": "high",
      "start_date": "2025-02-01",
      "due_date": "2025-03-01",
      "estimated_hours": 80
    }
