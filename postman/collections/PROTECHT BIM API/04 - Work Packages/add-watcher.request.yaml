$kind: http-request
name: 'Add Watcher'
method: POST
url: '{{baseUrl}}/api/v1/work_packages/:id/watchers'
order: 6000
headers:
  - key: Authorization
    value: 'Bearer {{authToken}}'
  - key: Content-Type
    value: application/json
pathVariables:
  - key: id
    value: '{{workPackageId}}'
body:
  type: json
  content: |-
    {
      "user_id": "{{userId}}"
    }
