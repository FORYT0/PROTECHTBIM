$kind: http-request
name: 'Add Work Packages to Sprint'
method: POST
url: '{{baseUrl}}/api/v1/sprints/:id/work-packages'
order: 7000
headers:
  - key: Authorization
    value: 'Bearer {{authToken}}'
  - key: Content-Type
    value: application/json
pathVariables:
  - key: id
    value: '{{sprintId}}'
body:
  type: json
  content: |-
    {
      "work_package_ids": ["{{workPackageId}}"]
    }
