$kind: http-request
name: 'Create Sprint'
method: POST
url: '{{baseUrl}}/api/v1/projects/:id/sprints'
order: 5000
headers:
  - key: Authorization
    value: 'Bearer {{authToken}}'
  - key: Content-Type
    value: application/json
pathVariables:
  - key: id
    value: '{{projectId}}'
body:
  type: json
  content: |-
    {
      "name": "Sprint 1",
      "start_date": "2025-02-01",
      "end_date": "2025-02-14",
      "capacity": 40
    }
