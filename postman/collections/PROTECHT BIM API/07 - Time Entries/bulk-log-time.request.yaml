$kind: http-request
name: 'Bulk Log Time'
method: POST
url: '{{baseUrl}}/api/v1/time_entries/bulk'
order: 6000
headers:
  - key: Authorization
    value: 'Bearer {{authToken}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "entries": [
        {
          "work_package_id": "{{workPackageId}}",
          "hours": 4,
          "date": "2025-02-01",
          "billable": true
        }
      ]
    }
