$kind: http-request
name: 'Get Project Activity'
method: GET
url: '{{baseUrl}}/api/v1/projects/:projectId/activity'
order: 5000
headers:
  - key: Authorization
    value: 'Bearer {{authToken}}'
pathVariables:
  - key: projectId
    value: '{{projectId}}'
queryParams:
  - key: page
    value: '1'
  - key: per_page
    value: '20'
