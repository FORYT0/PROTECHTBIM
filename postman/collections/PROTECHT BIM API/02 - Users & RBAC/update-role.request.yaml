$kind: http-request
name: 'Update Role (Admin)'
method: PATCH
url: '{{baseUrl}}/api/v1/roles/:id'
order: 6000
headers:
  - key: Authorization
    value: 'Bearer {{authToken}}'
  - key: Content-Type
    value: application/json
pathVariables:
  - key: id
    value: '{{roleId}}'
body:
  type: json
  content: |-
    {
      "name": "project_manager",
      "description": "Updated description"
    }
