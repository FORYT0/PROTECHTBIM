$kind: http-request
name: 'Create Role (Admin)'
method: POST
url: '{{baseUrl}}/api/v1/roles'
order: 5000
headers:
  - key: Authorization
    value: 'Bearer {{authToken}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "project_manager",
      "description": "Can manage projects and work packages",
      "permissionIds": []
    }
