$kind: http-request
name: 'AI Risk Score'
method: POST
url: '{{baseUrl}}/api/v1/ai/risk-score'
order: 1000
headers:
  - key: Authorization
    value: 'Bearer {{authToken}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "scenario": "Project is 2 weeks behind schedule and 10% over budget due to material delays"
    }
