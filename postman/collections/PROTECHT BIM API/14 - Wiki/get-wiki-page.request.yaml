$kind: http-request
name: 'Get Wiki Page by Slug'
method: GET
url: '{{baseUrl}}/api/v1/projects/:projectId/wiki/:slug'
order: 3000
headers:
  - key: Authorization
    value: 'Bearer {{authToken}}'
pathVariables:
  - key: projectId
    value: '{{projectId}}'
  - key: slug
    value: project-overview
