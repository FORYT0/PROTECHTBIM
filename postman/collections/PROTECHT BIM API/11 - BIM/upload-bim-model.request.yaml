$kind: http-request
name: 'Upload BIM Model (IFC)'
method: POST
url: '{{baseUrl}}/api/v1/projects/:projectId/bim/models'
order: 2000
headers:
  - key: Authorization
    value: 'Bearer {{authToken}}'
pathVariables:
  - key: projectId
    value: '{{projectId}}'
body:
  type: formdata
  content:
    - key: file
      type: file
      src: ''
