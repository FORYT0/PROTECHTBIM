$kind: http-request
name: 'Change Password'
method: POST
url: '{{baseUrl}}/api/v1/auth/change-password'
order: 5000
headers:
  - key: Authorization
    value: 'Bearer {{authToken}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "oldPassword": "password123",
      "newPassword": "newpassword456"
    }
