$kind: http-request
name: 'Recalculate Schedule'
method: POST
url: '{{baseUrl}}/api/v1/projects/:projectId/scheduling/recalculate'
order: 1000
headers:
  - key: Authorization
    value: 'Bearer {{authToken}}'
  - key: Content-Type
    value: application/json
pathVariables:
  - key: projectId
    value: '{{projectId}}'
body:
  type: json
  content: |-
    {
      "workPackageIds": ["{{workPackageId}}"]
    }
