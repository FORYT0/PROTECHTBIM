$kind: http-request
name: 'Get Gantt Data'
method: GET
url: '{{baseUrl}}/api/v1/projects/:id/gantt'
order: 7000
headers:
  - key: Authorization
    value: 'Bearer {{authToken}}'
pathVariables:
  - key: id
    value: '{{projectId}}'
queryParams:
  - key: include_relations
    value: 'true'
