  /icalendar/projects/{projectId}:
    get:
      tags:
        - iCalendar
      summary: Get iCalendar feed for a project
      description: |
        Generates an iCalendar (ICS) feed containing all work packages for the specified project.
        This feed can be subscribed to in external calendar applications like Google Calendar,
        Apple Calendar, Outlook, etc.
        
        The feed includes:
        - Work package subject as event summary
        - Start and due dates as event dates
        - Work package details (type, status, priority, progress, hours) in description
        - Assignee as attendee
        - Accountable person as organizer
        - Categories based on type and status
      operationId: getProjectCalendar
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          description: Project ID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: iCalendar feed generated successfully
          content:
            text/calendar:
              schema:
                type: string
                format: binary
                example: |
                  BEGIN:VCALENDAR
                  VERSION:2.0
                  PRODID:-//PROTECHT BIM//Project Management//EN
                  NAME:Project Name - Work Packages
                  BEGIN:VEVENT
                  UID:wp-123
                  SUMMARY:[TASK] Example Task
                  DTSTART:20240201T000000Z
                  DTEND:20240215T000000Z
                  DESCRIPTION:Task description...
                  END:VEVENT
                  END:VCALENDAR
          headers:
            Content-Disposition:
              schema:
                type: string
                example: attachment; filename="project-123.ics"
            Cache-Control:
              schema:
                type: string
                example: no-cache, no-store, must-revalidate
        '401':
          description: Unauthorized - Invalid or missing authentication token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /icalendar/users/me:
    get:
      tags:
        - iCalendar
      summary: Get iCalendar feed for authenticated user
      description: |
        Generates an iCalendar (ICS) feed containing all work packages assigned to the
        authenticated user across all projects.
        
        This is useful for users who want to see all their assigned tasks in their
        personal calendar application.
      operationId: getUserCalendar
      security:
        - bearerAuth: []
      responses:
        '200':
          description: iCalendar feed generated successfully
          content:
            text/calendar:
              schema:
                type: string
                format: binary
          headers:
            Content-Disposition:
              schema:
                type: string
                example: attachment; filename="my-work-packages.ics"
            Cache-Control:
              schema:
                type: string
                example: no-cache, no-store, must-revalidate
        '401':
          description: Unauthorized - Invalid or missing authentication token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
