openapi: 3.0.3
info:
  title: PROTECHT BIM API
  description: |
    REST API for PROTECHT BIM - A comprehensive construction project management platform with BIM integration.
    
    ## Authentication
    Most endpoints require authentication using JWT Bearer tokens. Include the token in the Authorization header:
    ```
    Authorization: Bearer <your_jwt_token>
    ```
    
    ## Phase 1 Features
    This API documentation covers Phase 1 implementation:
    - Authentication and user management
    - Project hierarchy (Portfolio, Program, Project)
    - Work package management
    - Work package relations and watchers
    - Role-based access control (RBAC)
    
  version: 1.0.0
  contact:
    name: PROTECHT BIM Support
    email: support@protecht-bim.com
  license:
    name: Proprietary

servers:
  - url: http://localhost:3000/api/v1
    description: Development server
  - url: https://api.protecht-bim.com/api/v1
    description: Production server

tags:
  - name: Authentication
    description: User authentication and session management
  - name: Projects
    description: Project hierarchy and management
  - name: Work Packages
    description: Work package CRUD and management
  - name: Work Package Relations
    description: Dependencies and relationships between work packages
  - name: RBAC
    description: Role-based access control management

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from /auth/login or /auth/register

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
          example: Bad Request
        message:
          type: string
          example: Validation error message
      required:
        - error
        - message

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string
          enum: [admin, project_manager, team_member, viewer]
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Tokens:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
          description: Access token expiration time in seconds

    Project:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        program_id:
          type: string
          format: uuid
          nullable: true
        portfolio_id:
          type: string
          format: uuid
          nullable: true
        owner_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [active, on_hold, completed, archived]
        lifecycle_phase:
          type: string
          enum: [initiation, planning, execution, monitoring, closure]
        start_date:
          type: string
          format: date
          nullable: true
        end_date:
          type: string
          format: date
          nullable: true
        template_id:
          type: string
          format: uuid
          nullable: true
        custom_fields:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        owner:
          type: object
          properties:
            id:
              type: string
              format: uuid
            email:
              type: string
            name:
              type: string
        program:
          type: object
          nullable: true
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
        portfolio:
          type: object
          nullable: true
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string

    WorkPackage:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        type:
          type: string
          enum: [task, milestone, phase, feature, bug]
        subject:
          type: string
        description:
          type: string
        status:
          type: string
        priority:
          type: string
          enum: [low, normal, high, urgent]
        assignee_id:
          type: string
          format: uuid
          nullable: true
        accountable_id:
          type: string
          format: uuid
          nullable: true
        parent_id:
          type: string
          format: uuid
          nullable: true
        start_date:
          type: string
          format: date
          nullable: true
        due_date:
          type: string
          format: date
          nullable: true
        estimated_hours:
          type: number
          format: float
          nullable: true
        spent_hours:
          type: number
          format: float
        progress_percent:
          type: integer
          minimum: 0
          maximum: 100
        scheduling_mode:
          type: string
          enum: [automatic, manual]
        version_id:
          type: string
          format: uuid
          nullable: true
        sprint_id:
          type: string
          format: uuid
          nullable: true
        story_points:
          type: integer
          nullable: true
        custom_fields:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    WorkPackageRelation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        from_id:
          type: string
          format: uuid
        to_id:
          type: string
          format: uuid
        relation_type:
          type: string
          enum: [successor, predecessor, blocks, blocked_by, relates_to, duplicates]
        lag_days:
          type: integer
        created_at:
          type: string
          format: date-time

    WorkPackageWatcher:
      type: object
      properties:
        work_package_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        user:
          type: object
          properties:
            id:
              type: string
              format: uuid
            email:
              type: string
            name:
              type: string

    Role:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        isSystem:
          type: boolean
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/Permission'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Permission:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        resource:
          type: string
        action:
          type: string
        description:
          type: string
        createdAt:
          type: string
          format: date-time

paths:
  /auth/register:
    post:
      tags:
        - Authentication
      summary: Register a new user
      description: Create a new user account with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - name
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                  description: Password must be at least 8 characters
                name:
                  type: string
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
                  tokens:
                    $ref: '#/components/schemas/Tokens'
        '400':
          description: Bad request - validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/login:
    post:
      tags:
        - Authentication
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
                  tokens:
                    $ref: '#/components/schemas/Tokens'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/refresh:
    post:
      tags:
        - Authentication
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  tokens:
                    $ref: '#/components/schemas/Tokens'
        '401':
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/logout:
    post:
      tags:
        - Authentication
      summary: Logout user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/me:
    get:
      tags:
        - Authentication
      summary: Get current user information
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User information retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/change-password:
    post:
      tags:
        - Authentication
      summary: Change user password
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - oldPassword
                - newPassword
              properties:
                oldPassword:
                  type: string
                newPassword:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Password changed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '401':
          description: Invalid old password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /projects:
    get:
      tags:
        - Projects
      summary: List projects with filtering
      security:
        - bearerAuth: []
      parameters:
        - name: portfolio_id
          in: query
          schema:
            type: string
            format: uuid
        - name: program_id
          in: query
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            type: string
          description: Comma-separated list of statuses
        - name: owner_id
          in: query
          schema:
            type: string
            format: uuid
        - name: search
          in: query
          schema:
            type: string
          description: Search in project name and description
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
        - name: sort_by
          in: query
          schema:
            type: string
            default: createdAt
        - name: sort_order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        '200':
          description: Projects retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  projects:
                    type: array
                    items:
                      $ref: '#/components/schemas/Project'
                  total:
                    type: integer
                  page:
                    type: integer
                  per_page:
                    type: integer

    post:
      tags:
        - Projects
      summary: Create a new project
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                description:
                  type: string
                program_id:
                  type: string
                  format: uuid
                portfolio_id:
                  type: string
                  format: uuid
                status:
                  type: string
                  enum: [active, on_hold, completed, archived]
                lifecycle_phase:
                  type: string
                  enum: [initiation, planning, execution, monitoring, closure]
                start_date:
                  type: string
                  format: date
                end_date:
                  type: string
                  format: date
                template_id:
                  type: string
                  format: uuid
                custom_fields:
                  type: object
      responses:
        '201':
          description: Project created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  project:
                    $ref: '#/components/schemas/Project'

  /projects/{id}:
    get:
      tags:
        - Projects
      summary: Get project by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Project retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  project:
                    $ref: '#/components/schemas/Project'
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    patch:
      tags:
        - Projects
      summary: Update project
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                program_id:
                  type: string
                  format: uuid
                portfolio_id:
                  type: string
                  format: uuid
                status:
                  type: string
                lifecycle_phase:
                  type: string
                start_date:
                  type: string
                  format: date
                end_date:
                  type: string
                  format: date
                custom_fields:
                  type: object
      responses:
        '200':
          description: Project updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  project:
                    $ref: '#/components/schemas/Project'

    delete:
      tags:
        - Projects
      summary: Delete project
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Project deleted successfully
        '404':
          description: Project not found

  /projects/{id}/transition-phase:
    post:
      tags:
        - Projects
      summary: Transition project lifecycle phase
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - new_phase
              properties:
                new_phase:
                  type: string
                  enum: [initiation, planning, execution, monitoring, closure]
      responses:
        '200':
          description: Phase transitioned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  project:
                    $ref: '#/components/schemas/Project'
                  message:
                    type: string

  /work_packages:
    get:
      tags:
        - Work Packages
      summary: List work packages with filtering
      security:
        - bearerAuth: []
      parameters:
        - name: project_id
          in: query
          schema:
            type: string
            format: uuid
        - name: type
          in: query
          schema:
            type: string
          description: Comma-separated list of types
        - name: status
          in: query
          schema:
            type: string
          description: Comma-separated list of statuses
        - name: assignee_id
          in: query
          schema:
            type: string
            format: uuid
        - name: parent_id
          in: query
          schema:
            type: string
            format: uuid
        - name: priority
          in: query
          schema:
            type: string
        - name: start_date_from
          in: query
          schema:
            type: string
            format: date
        - name: start_date_to
          in: query
          schema:
            type: string
            format: date
        - name: due_date_from
          in: query
          schema:
            type: string
            format: date
        - name: due_date_to
          in: query
          schema:
            type: string
            format: date
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
        - name: sort_by
          in: query
          schema:
            type: string
        - name: sort_order
          in: query
          schema:
            type: string
            enum: [asc, desc]
      responses:
        '200':
          description: Work packages retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  work_packages:
                    type: array
                    items:
                      $ref: '#/components/schemas/WorkPackage'
                  total:
                    type: integer
                  page:
                    type: integer
                  per_page:
                    type: integer

    post:
      tags:
        - Work Packages
      summary: Create a new work package
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - project_id
                - type
                - subject
              properties:
                project_id:
                  type: string
                  format: uuid
                type:
                  type: string
                  enum: [task, milestone, phase, feature, bug]
                subject:
                  type: string
                description:
                  type: string
                status:
                  type: string
                priority:
                  type: string
                  enum: [low, normal, high, urgent]
                assignee_id:
                  type: string
                  format: uuid
                accountable_id:
                  type: string
                  format: uuid
                parent_id:
                  type: string
                  format: uuid
                start_date:
                  type: string
                  format: date
                due_date:
                  type: string
                  format: date
                estimated_hours:
                  type: number
                scheduling_mode:
                  type: string
                  enum: [automatic, manual]
                version_id:
                  type: string
                  format: uuid
                sprint_id:
                  type: string
                  format: uuid
                story_points:
                  type: integer
                custom_fields:
                  type: object
      responses:
        '201':
          description: Work package created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  work_package:
                    $ref: '#/components/schemas/WorkPackage'

  /work_packages/{id}:
    get:
      tags:
        - Work Packages
      summary: Get work package by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Work package retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  work_package:
                    $ref: '#/components/schemas/WorkPackage'

    patch:
      tags:
        - Work Packages
      summary: Update work package
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                subject:
                  type: string
                description:
                  type: string
                status:
                  type: string
                priority:
                  type: string
                assignee_id:
                  type: string
                  format: uuid
                start_date:
                  type: string
                  format: date
                due_date:
                  type: string
                  format: date
                progress_percent:
                  type: integer
                custom_fields:
                  type: object
      responses:
        '200':
          description: Work package updated successfully

    delete:
      tags:
        - Work Packages
      summary: Delete work package
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Work package deleted successfully

  /work_packages/{id}/watchers:
    get:
      tags:
        - Work Packages
      summary: List work package watchers
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Watchers retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  watchers:
                    type: array
                    items:
                      $ref: '#/components/schemas/WorkPackageWatcher'

    post:
      tags:
        - Work Packages
      summary: Add watcher to work package
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user_id
              properties:
                user_id:
                  type: string
                  format: uuid
      responses:
        '201':
          description: Watcher added successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  watcher:
                    $ref: '#/components/schemas/WorkPackageWatcher'

  /work_packages/{id}/watchers/{user_id}:
    delete:
      tags:
        - Work Packages
      summary: Remove watcher from work package
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Watcher removed successfully

  /work_packages/{id}/relations:
    get:
      tags:
        - Work Package Relations
      summary: List work package relations
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Relations retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  relations:
                    type: array
                    items:
                      $ref: '#/components/schemas/WorkPackageRelation'

    post:
      tags:
        - Work Package Relations
      summary: Create work package relation
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - to_id
                - relation_type
              properties:
                to_id:
                  type: string
                  format: uuid
                relation_type:
                  type: string
                  enum: [successor, predecessor, blocks, blocked_by, relates_to, duplicates]
                lag_days:
                  type: integer
                  default: 0
      responses:
        '201':
          description: Relation created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  relation:
                    $ref: '#/components/schemas/WorkPackageRelation'
        '409':
          description: Circular dependency detected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /work_package_relations/{id}:
    delete:
      tags:
        - Work Package Relations
      summary: Delete work package relation
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
